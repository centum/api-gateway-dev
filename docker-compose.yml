services:
  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.${INGRESS_MODE:-direct}.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./letsencrypt:/letsencrypt
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN:-}
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL:-}
      - ACME_CA_SERVER=${ACME_CA_SERVER:-}
      - DASHBOARD_AUTH=${DASHBOARD_AUTH}
    networks:
      - traefik_webgateway
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${NETWORK_NAME:-traefik_webgateway}"
      - "traefik.http.routers.dashboard.rule=Host(`${DASHBOARD_SUBDOMAIN:-traefik}.${DOMAIN}`)"
      - "traefik.http.routers.dashboard.entrypoints=public"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=${DASHBOARD_AUTH}"
      - "traefik.http.routers.dashboard.middlewares=dashboard-auth@docker"

  cf-ip-updater:
    profiles: ["direct"]
    image: ${CF_IPS_UPDATER_IMAGE:-alpine:3.20}
    restart: unless-stopped
    volumes:
      - ./scripts/update-cf-ips.sh:/usr/local/bin/update-cf-ips.sh:ro
      - ./traefik/dynamic:/work/traefik/dynamic
    working_dir: /work
    environment:
      - UPDATE_INTERVAL=${CF_IPS_UPDATE_INTERVAL:-7d}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        apk add --no-cache bash curl coreutils >/dev/null
        while true; do
          echo "[cf-ip-updater] running update at $(date -Iseconds)"
          bash /usr/local/bin/update-cf-ips.sh || echo "[cf-ip-updater] update failed, keeping previous file"
          echo "[cf-ip-updater] sleeping $${UPDATE_INTERVAL}"
          sleep "$${UPDATE_INTERVAL}"
        done

  cloudflared:
    profiles: ["tunnel"]
    image: cloudflare/cloudflared:${CLOUDFLARED_IMAGE_TAG:-latest}
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    networks:
      - traefik_webgateway
    depends_on:
      - traefik

networks:
  traefik_webgateway:
    external: true
    name: ${NETWORK_NAME:-traefik_webgateway}
